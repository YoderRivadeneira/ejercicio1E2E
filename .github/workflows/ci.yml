name: CI for E2E Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Configurar el repositorio
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      # 3. Cache para dependencias de Gradle
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Asignar permisos de ejecución al gradlew
      - name: Grant execute permissions for Gradle Wrapper
        run: chmod +x ./gradlew

      # 5. Verificar Gradle Wrapper
      - name: Verify Gradle wrapper
        run: ./gradlew wrapper --gradle-version 7.6.1

      # 6. Ejecutar las pruebas en modo headless
      - name: Run tests in headless mode
        run: ./gradlew test --tests "com.devsu.ejercicio1E2E.runner.EjecutarSerenity" --info
        env:
          CHROME_ARGS: "--headless --no-sandbox --disable-dev-shm-usage --disable-gpu"

      # 7. Generar reportes de Serenity
      - name: Generate Serenity Reports
        run: ./gradlew aggregate
        if: always()

      # 8. Subir artefactos (reportes de Serenity)
      - name: Upload Serenity Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: serenity-reports
          path: target/site/serenity/
          retention-days: 30

      # 9. Subir artefactos (reportes de pruebas)
      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: build/reports/tests/test/
          retention-days: 30
